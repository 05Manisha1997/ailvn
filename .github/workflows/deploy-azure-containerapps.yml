# Build the Docker image and push to ACR, then roll out a new Container App revision.
# Uses `docker build` + `docker push` (not `az acr build`) so it works when ACR Tasks
# is disabled — e.g. "TasksOperationsNotAllowed" on some student / restricted subscriptions.
#
# Prerequisites (Azure + GitHub):
# 1) Resource group, ACR, and Container App already exist; the app’s first revision
#    must use an image from this ACR (so registry integration / AcrPull identity is set).
# 2) Microsoft Entra app registration with a federated credential for GitHub OIDC.
# 3) That app’s service principal has AcrPush on the ACR and rights to update the
#    Container App (e.g. Contributor on the resource group, or tighter custom roles).
# 4) GitHub repo Secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# 5) GitHub repo Variables: AZURE_RESOURCE_GROUP, AZURE_CONTAINERAPP_NAME, AZURE_ACR_NAME

name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: voice-navigator

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image (Docker — no ACR Tasks)
        run: |
          ACR="${{ vars.AZURE_ACR_NAME }}.azurecr.io"
          IMG="${{ env.IMAGE_NAME }}"
          az acr login --name "${{ vars.AZURE_ACR_NAME }}"
          docker build -t "${ACR}/${IMG}:${{ github.sha }}" -t "${ACR}/${IMG}:latest" .
          docker push "${ACR}/${IMG}:${{ github.sha }}"
          docker push "${ACR}/${IMG}:latest"

      - name: Update Container App
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.AZURE_ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
