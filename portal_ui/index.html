<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AILVN — Portal UI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0F172A; color: #E2E8F0; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #1E293B; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = `${window.location.origin}/portal/v1`;
const APP_API = `${window.location.origin}`;

// ── Color helpers ──────────────────────────────────────────────────────────
const INTENT_COLORS = {
  ACCOUNT_BALANCE:    '#38BDF8', RECENT_TRANSACTIONS: '#34D399',
  COMPLAINT:          '#F87171', PRODUCT_INFO:         '#FB923C',
  BILLING_QUERY:      '#A78BFA', TECH_SUPPORT:         '#F472B6',
  TRANSFER_AGENT:     '#FCD34D', LOAN_QUERY:           '#2DD4BF',
  GENERAL_QUERY:      '#94A3B8', GOODBYE:              '#64748B',
};

const Badge = ({ label, color }) => (
  <span style={{
    display:'inline-block', padding:'2px 10px', borderRadius:12,
    background: color + '22', color, border:`1px solid ${color}55`,
    fontSize:11, fontWeight:600, letterSpacing:0.5
  }}>{label.replace(/_/g,' ')}</span>
);

const Card = ({ children, style }) => (
  <div style={{
    background:'#1E293B', borderRadius:10, border:'1px solid #334155',
    padding:20, ...style
  }}>{children}</div>
);

const Input = ({ label, value, onChange, multiline, placeholder, style }) => (
  <div style={{ marginBottom:14 }}>
    {label && <div style={{ fontSize:11, color:'#94A3B8', fontWeight:600,
      marginBottom:5, textTransform:'uppercase', letterSpacing:0.5 }}>{label}</div>}
    {multiline
      ? <textarea value={value} onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
          style={{ width:'100%', background:'#0F172A', border:'1px solid #334155',
            borderRadius:6, padding:'8px 12px', color:'#E2E8F0', fontSize:13,
            resize:'vertical', minHeight:80, fontFamily:'monospace', ...style }} />
      : <input value={value} onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
          style={{ width:'100%', background:'#0F172A', border:'1px solid #334155',
            borderRadius:6, padding:'8px 12px', color:'#E2E8F0', fontSize:13, ...style }} />
    }
  </div>
);

const Btn = ({ children, onClick, color='#38BDF8', outline, small, style }) => (
  <button onClick={onClick} style={{
    background: outline ? 'transparent' : color + '22',
    color, border:`1px solid ${color}55`,
    borderRadius:6, padding: small ? '5px 12px' : '8px 18px',
    fontSize: small ? 12 : 13, fontWeight:600, cursor:'pointer',
    transition:'all 0.15s', ...style
  }}>{children}</button>
);

const MOCK_CALLS = [
  { call_id:'abc-001', caller_name:'John Smith', caller_phone:'+14155552671',
    is_verified:true, current_intent:'ACCOUNT_BALANCE',
    intent_history:['ACCOUNT_BALANCE','COMPLAINT'], turn_count:6,
    started_at:'2024-01-15T14:30:00Z', ended_at:'2024-01-15T14:36:00Z' },
  { call_id:'abc-002', caller_name:'Jane Doe', caller_phone:'+14155552672',
    is_verified:true, current_intent:'PRODUCT_INFO',
    intent_history:['PRODUCT_INFO'], turn_count:3,
    started_at:'2024-01-15T14:45:00Z', ended_at:null },
  { call_id:'abc-003', caller_name:'Bob Johnson', caller_phone:'+14155552673',
    is_verified:false, current_intent:null,
    intent_history:[], turn_count:1,
    started_at:'2024-01-15T15:00:00Z', ended_at:'2024-01-15T15:01:00Z' },
];

// ── Pages ──────────────────────────────────────────────────────────────────

function TemplatesPage() {
  const [templates, setTemplates] = useState({});
  const [selected, setSelected] = useState(null);
  const [editing, setEditing] = useState(null);
  const [saved, setSaved] = useState(false);
  const [loadErr, setLoadErr] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    setLoadErr(null);
    try {
      const r = await fetch(`${API}/templates`);
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      setTemplates(data);
      const keys = Object.keys(data).sort();
      setSelected(prev => (prev && data[prev] ? prev : (keys[0] || null)));
    } catch (e) {
      setLoadErr(e.message || String(e));
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { load(); }, [ load ]);

  async function addNewIntent() {
    const intent = window.prompt('Intent key (e.g. hospital_covered):');
    if (!intent || !intent.trim()) return;
    const template = window.prompt('Template text with {rag.slot_name} placeholders:', 'Your answer is {rag.detail}.');
    if (template == null) return;
    try {
      const r = await fetch(`${API}/templates`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          intent: intent.trim(),
          template,
          enabled: true,
          doc_sources: [],
        }),
      });
      if (!r.ok) throw new Error(await r.text());
      await load();
      setSelected(intent.trim());
    } catch (e) {
      alert('Create failed: ' + (e.message || e));
    }
  }

  const t = (editing || (selected ? templates[selected] : null));
  if (!t && !loading) {
    return (
      <Card>
        {loadErr && <div style={{ color:'#F87171', marginBottom:12 }}>{loadErr}</div>}
        <div style={{ color:'#94A3B8', marginBottom:12 }}>No templates loaded. Add an intent or check API connectivity.</div>
        <Btn onClick={load} color='#38BDF8' small>Reload</Btn>
        <Btn onClick={addNewIntent} color='#34D399' small style={{ marginLeft:8 }}>New intent</Btn>
      </Card>
    );
  }

  async function saveToServer() {
    if (!t) return;
    try {
      let doc_sources = Array.isArray(t.doc_sources) ? t.doc_sources : [];
      if (editing && editing.doc_sources_json != null && editing.doc_sources_json !== '') {
        try { doc_sources = JSON.parse(editing.doc_sources_json); } catch (_) { /* keep previous */ }
      }
      const body = {
        template: t.template,
        voice_id: t.voice_id || null,
        enabled: t.enabled !== false,
        doc_sources,
      };
      const r = await fetch(`${API}/templates/${encodeURIComponent(t.intent)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error(await r.text());
      setEditing(null);
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
      await load();
    } catch (e) {
      alert('Save failed: ' + (e.message || e));
    }
  }

  async function removeIntent() {
    if (!t || t.intent === 'fallback_human') { alert('Cannot delete protected intent.'); return; }
    if (!window.confirm(`Delete intent ${t.intent}?`)) return;
    try {
      const r = await fetch(`${API}/templates/${encodeURIComponent(t.intent)}`, { method: 'DELETE' });
      if (!r.ok) throw new Error(await r.text());
      setEditing(null);
      await load();
    } catch (e) {
      alert('Delete failed: ' + (e.message || e));
    }
  }

  if (loading || !t) {
    return <Card><div style={{ color:'#94A3B8' }}>Loading templates from Cosmos…</div></Card>;
  }

  const docJson = JSON.stringify(t.doc_sources || [], null, 2);

  return (
    <div style={{ display:'grid', gridTemplateColumns:'220px 1fr', gap:20 }}>
      <div>
        <div style={{ fontSize:11, color:'#64748B', fontWeight:700,
          textTransform:'uppercase', letterSpacing:1, marginBottom:10 }}>Intents</div>
        <Btn onClick={addNewIntent} color='#34D399' small style={{ width:'100%', marginBottom:10 }}>+ New intent</Btn>
        {Object.keys(templates).sort().map(intent => (
          <div key={intent} onClick={() => { setSelected(intent); setEditing(null); }}
            style={{
              padding:'9px 12px', borderRadius:7, marginBottom:4, cursor:'pointer',
              background: selected === intent ? '#1E3A5F' : 'transparent',
              border: `1px solid ${selected === intent ? '#38BDF8' : 'transparent'}`,
              display:'flex', alignItems:'center', gap:8
            }}>
            <div style={{ width:8, height:8, borderRadius:'50%',
              background: INTENT_COLORS[intent] || '#64748B' }} />
            <span style={{ fontSize:12, fontWeight:600 }}>{intent.replace(/_/g,' ')}</span>
            {!templates[intent].enabled &&
              <span style={{ marginLeft:'auto', fontSize:9, color:'#F87171' }}>OFF</span>}
          </div>
        ))}
      </div>

      <div>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16, flexWrap:'wrap' }}>
          <Badge label={t.intent} color={INTENT_COLORS[t.intent] || '#64748B'} />
          <div style={{ flex:1 }} />
          {saved && <span style={{ color:'#34D399', fontSize:13 }}>✓ Saved</span>}
          <Btn onClick={load} outline color='#64748B' small>Reload</Btn>
          {editing && <Btn onClick={() => setEditing(null)} outline color='#64748B' small>Cancel</Btn>}
          <Btn onClick={saveToServer} color='#34D399' small>Save to Cosmos</Btn>
          {t.intent !== 'fallback_human' && (
            <Btn onClick={removeIntent} color='#F87171' outline small>Delete</Btn>
          )}
        </div>
        {loadErr && <div style={{ color:'#F87171', marginBottom:12 }}>{loadErr}</div>}

        <Card style={{ marginBottom:16 }}>
          <div style={{ fontSize:12, fontWeight:700, color:'#94A3B8',
            textTransform:'uppercase', letterSpacing:0.5, marginBottom:14 }}>Response template</div>
          <Input
            label="Spoken text — use {rag.fieldname} for slots filled from RAG"
            value={t.template}
            onChange={val => setEditing({ ...(editing || t), template: val })}
            multiline
            placeholder="Your policy covers {rag.coverage_pct} at {rag.hospital_name}."
            style={{ minHeight:90 }}
          />
          <div style={{ fontSize:11, color:'#64748B', marginTop:8 }}>
            Slots detected: {(t.template || '').match(/\{rag\.\w+\}/g)?.join('  ') || '—'}
          </div>
          <Input
            label="ElevenLabs voice_id (optional)"
            value={t.voice_id || ''}
            onChange={val => setEditing({ ...(editing || t), voice_id: val || null })}
            placeholder="defaults to server ELEVENLABS_VOICE_ID"
          />
          <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, color:'#94A3B8', marginTop:8 }}>
            <input type="checkbox"
              checked={t.enabled !== false}
              onChange={e => setEditing({ ...(editing || t), enabled: e.target.checked })} />
            Intent enabled
          </label>
        </Card>

        <Card style={{ marginTop:16 }}>
          <div style={{ fontSize:12, fontWeight:700, color:'#94A3B8',
            textTransform:'uppercase', letterSpacing:0.5, marginBottom:12 }}>doc_sources (JSON, optional)</div>
          <textarea
            value={editing ? (editing.doc_sources_json != null ? editing.doc_sources_json : docJson) : docJson}
            onChange={e => {
              const base = editing || t;
              setEditing({ ...base, doc_sources_json: e.target.value });
            }}
            onBlur={() => {
              if (!editing || editing.doc_sources_json == null) return;
              try {
                const parsed = JSON.parse(editing.doc_sources_json || '[]');
                setEditing({ ...editing, doc_sources: parsed, doc_sources_json: null });
              } catch (_) { /* keep editing */ }
            }}
            style={{ width:'100%', minHeight:100, background:'#0F172A', border:'1px solid #334155',
              borderRadius:6, padding:10, color:'#E2E8F0', fontFamily:'monospace', fontSize:12 }}
          />
          <div style={{ fontSize:11, color:'#64748B', marginTop:8 }}>
            Example: <code style={{ color:'#38BDF8' }}>[{`{"type":"azure_blob","prefix":"policies/"}`}]</code>
          </div>
        </Card>
      </div>
    </div>
  );
}

function LiveCallsPage() {
  const [calls] = useState(MOCK_CALLS.filter(c => !c.ended_at));
  const [selected, setSelected] = useState(null);

  const activeCalls = calls;

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
        <div style={{ width:8, height:8, borderRadius:'50%', background:'#34D399',
          boxShadow:'0 0 8px #34D399' }} />
        <span style={{ fontSize:13, color:'#34D399', fontWeight:700 }}>
          {activeCalls.length} Active Call{activeCalls.length !== 1 ? 's' : ''}
        </span>
        <span style={{ color:'#475569', fontSize:12 }}>Auto-refreshing every 5s</span>
      </div>

      {activeCalls.length === 0
        ? <Card><div style={{ textAlign:'center', padding:40, color:'#475569' }}>
            No active calls right now.
          </div></Card>
        : activeCalls.map(call => (
          <Card key={call.call_id} style={{ marginBottom:12,
            border: selected === call.call_id ? '1px solid #38BDF8' : '1px solid #334155',
            cursor:'pointer' }}
            onClick={() => setSelected(selected === call.call_id ? null : call.call_id)}>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <div style={{ width:36, height:36, borderRadius:'50%', background:'#1E3A5F',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:14, fontWeight:700, color:'#38BDF8' }}>
                {(call.caller_name || 'U')[0]}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:14 }}>
                  {call.caller_name || 'Unknown Caller'}
                  {call.is_verified && <span style={{ marginLeft:8, fontSize:10,
                    color:'#34D399' }}>✓ Verified</span>}
                </div>
                <div style={{ fontSize:12, color:'#64748B' }}>{call.caller_phone}</div>
              </div>
              <div style={{ textAlign:'right' }}>
                {call.current_intent &&
                  <Badge label={call.current_intent} color={INTENT_COLORS[call.current_intent] || '#64748B'} />}
                <div style={{ fontSize:11, color:'#475569', marginTop:4 }}>
                  {call.turn_count} turns
                </div>
              </div>
              <Btn color='#F87171' small outline>Transfer to Agent</Btn>
            </div>

            {selected === call.call_id && (
              <div style={{ marginTop:14, paddingTop:14, borderTop:'1px solid #334155' }}>
                <div style={{ fontSize:11, color:'#64748B', marginBottom:8 }}>Intent Journey</div>
                <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                  {call.intent_history.map((intent, i) => (
                    <div key={i} style={{ display:'flex', alignItems:'center', gap:4 }}>
                      {i > 0 && <span style={{ color:'#475569' }}>→</span>}
                      <Badge label={intent} color={INTENT_COLORS[intent] || '#64748B'} />
                    </div>
                  ))}
                </div>
                <div style={{ marginTop:12, display:'flex', gap:8 }}>
                  <Btn color='#38BDF8' small>View Full Context</Btn>
                  <Btn color='#A78BFA' small outline>View Documents</Btn>
                </div>
              </div>
            )}
          </Card>
        ))
      }
    </div>
  );
}

function CallHistoryPage() {
  const [calls] = useState(MOCK_CALLS);
  const [filter, setFilter] = useState('');

  const filtered = calls.filter(c =>
    !filter ||
    c.caller_name?.toLowerCase().includes(filter.toLowerCase()) ||
    c.caller_phone?.includes(filter)
  );

  return (
    <div>
      <div style={{ marginBottom:16 }}>
        <Input placeholder="Search by name or phone..."
          value={filter} onChange={setFilter} />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:20 }}>
        {[
          { label:'Total Calls', value:calls.length, color:'#38BDF8' },
          { label:'Verified', value:calls.filter(c=>c.is_verified).length, color:'#34D399' },
          { label:'Escalated', value:calls.filter(c=>c.intent_history.includes('TRANSFER_AGENT')).length, color:'#F87171' },
        ].map(s => (
          <Card key={s.label} style={{ textAlign:'center' }}>
            <div style={{ fontSize:32, fontWeight:800, color:s.color }}>{s.value}</div>
            <div style={{ fontSize:12, color:'#64748B', marginTop:4 }}>{s.label}</div>
          </Card>
        ))}
      </div>

      {filtered.map(call => (
        <Card key={call.call_id} style={{ marginBottom:10 }}>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ flex:1 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontWeight:700 }}>{call.caller_name || 'Unknown'}</span>
                {call.is_verified
                  ? <span style={{ fontSize:10, color:'#34D399' }}>✓ Verified</span>
                  : <span style={{ fontSize:10, color:'#F87171' }}>✗ Unverified</span>}
              </div>
              <div style={{ fontSize:12, color:'#64748B', marginTop:2 }}>
                {call.caller_phone} • {call.turn_count} turns •{' '}
                {new Date(call.started_at).toLocaleString()}
              </div>
              <div style={{ display:'flex', gap:4, marginTop:6, flexWrap:'wrap' }}>
                {call.intent_history.map(intent => (
                  <Badge key={intent} label={intent} color={INTENT_COLORS[intent] || '#64748B'} />
                ))}
              </div>
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <Badge
                label={call.ended_at ? 'Ended' : 'Active'}
                color={call.ended_at ? '#64748B' : '#34D399'}
              />
              <Btn color='#38BDF8' small outline>Summary</Btn>
            </div>
          </div>
        </Card>
      ))}
    </div>
  );
}

function AnalyticsPage() {
  const [stats, setStats] = useState(null);
  useEffect(() => {
    (async () => {
      try {
        const r = await fetch(`${APP_API}/analytics`);
        if (r.ok) setStats(await r.json());
      } catch (_) {}
    })();
  }, []);
  if (!stats) {
    return <Card><div style={{ color:'#94A3B8' }}>Loading analytics…</div></Card>;
  }
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12 }}>
      <Card><div style={{ fontSize:11, color:'#64748B' }}>Calls Today</div><div style={{ fontSize:28, fontWeight:800 }}>{stats.calls_today ?? 0}</div></Card>
      <Card><div style={{ fontSize:11, color:'#64748B' }}>Resolved %</div><div style={{ fontSize:28, fontWeight:800 }}>{stats.resolution_rate ?? 0}%</div></Card>
      <Card><div style={{ fontSize:11, color:'#64748B' }}>Avg Handle Time</div><div style={{ fontSize:28, fontWeight:800 }}>{stats.avg_handle_time_sec ?? 0}s</div></Card>
      <Card><div style={{ fontSize:11, color:'#64748B' }}>Transferred %</div><div style={{ fontSize:28, fontWeight:800 }}>{stats.transfer_rate ?? 0}%</div></Card>
    </div>
  );
}

function PolicyManagerPage() {
  const [rows, setRows] = useState([]);
  useEffect(() => {
    (async () => {
      try {
        const r = await fetch(`${APP_API}/simulate/policyholders`);
        if (r.ok) {
          const j = await r.json();
          setRows(j.policyholders || []);
        }
      } catch (_) {}
    })();
  }, []);
  return (
    <Card>
      <div style={{ fontSize:12, fontWeight:700, color:'#94A3B8', textTransform:'uppercase', marginBottom:12 }}>
        Policyholders (from simulator API)
      </div>
      <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
        <thead>
          <tr style={{ color:'#94A3B8', textAlign:'left' }}>
            <th style={{ padding:'8px 6px' }}>Member ID</th>
            <th style={{ padding:'8px 6px' }}>Name</th>
            <th style={{ padding:'8px 6px' }}>Phone</th>
            <th style={{ padding:'8px 6px' }}>Plan</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(r => (
            <tr key={r.member_id} style={{ borderTop:'1px solid #334155' }}>
              <td style={{ padding:'8px 6px' }}>{r.member_id}</td>
              <td style={{ padding:'8px 6px' }}>{r.name}</td>
              <td style={{ padding:'8px 6px' }}>{r.phone}</td>
              <td style={{ padding:'8px 6px' }}>{r.plan_name}</td>
            </tr>
          ))}
          {!rows.length && (
            <tr><td colSpan="4" style={{ padding:'10px 6px', color:'#64748B' }}>No policyholders available.</td></tr>
          )}
        </tbody>
      </table>
    </Card>
  );
}

// ── App Shell ──────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { id:'templates', label:'Response Templates', icon:'⚙️' },
  { id:'live',      label:'Live Calls',         icon:'📞' },
  { id:'history',   label:'Call History',       icon:'📋' },
  { id:'analytics', label:'Analytics',          icon:'📊' },
  { id:'policies',  label:'Policy Manager',     icon:'🗂️' },
];

function App() {
  const [page, setPage] = useState('templates');

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      {/* Sidebar */}
      <div style={{ width:240, background:'#0B1120', borderRight:'1px solid #1E293B',
        padding:20, display:'flex', flexDirection:'column' }}>
        <div style={{ marginBottom:32 }}>
          <div style={{ fontSize:16, fontWeight:800, color:'#38BDF8', letterSpacing:-0.5 }}>
            AILVN
          </div>
          <div style={{ fontSize:11, color:'#475569', marginTop:2 }}>AI powered Laya Voice Navigator</div>
        </div>

        {NAV_ITEMS.map(item => (
          <div key={item.id} onClick={() => setPage(item.id)}
            style={{
              display:'flex', alignItems:'center', gap:10,
              padding:'10px 12px', borderRadius:7, marginBottom:4,
              cursor:'pointer',
              background: page === item.id ? '#1E3A5F' : 'transparent',
              color: page === item.id ? '#38BDF8' : '#64748B',
              fontWeight: page === item.id ? 700 : 400,
              fontSize:13, transition:'all 0.15s'
            }}>
            <span>{item.icon}</span>
            {item.label}
          </div>
        ))}

        <div style={{ marginTop:'auto', padding:'12px 0',
          borderTop:'1px solid #1E293B', fontSize:11, color:'#334155' }}>
          <div>API: {API}</div>
          <div style={{ marginTop:4, display:'flex', alignItems:'center', gap:6 }}>
            <div style={{ width:6, height:6, borderRadius:'50%', background:'#34D399' }} />
            System Online
          </div>
        </div>
      </div>

      {/* Main */}
      <div style={{ flex:1, padding:28, overflowY:'auto' }}>
        <div style={{ fontSize:20, fontWeight:800, marginBottom:6 }}>
          {NAV_ITEMS.find(n => n.id === page)?.icon}{' '}
          {NAV_ITEMS.find(n => n.id === page)?.label}
        </div>
        <div style={{ color:'#475569', fontSize:13, marginBottom:24 }}>
          {page === 'templates' && 'Configure intent mappings, response templates, and sub-routing logic.'}
          {page === 'live' && 'Monitor active calls in real-time. Transfer to live agents if needed.'}
          {page === 'history' && 'Review completed calls, intent journeys, and summaries.'}
          {page === 'analytics' && 'Operational analytics for calls and AI performance.'}
          {page === 'policies' && 'Policyholder directory and plan snapshot.'}
        </div>

        {page === 'templates' && <TemplatesPage />}
        {page === 'live'      && <LiveCallsPage />}
        {page === 'history'   && <CallHistoryPage />}
        {page === 'analytics' && <AnalyticsPage />}
        {page === 'policies'  && <PolicyManagerPage />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
